<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>简历初筛看板</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono&family=Noto+Sans+SC&display=swap');
  html, body {
    margin: 0; padding: 0; height: 100%;
    background-color: #0f0f11;
    color: #ddd;
    font-family: 'Noto Sans SC', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  #app {
    max-width: 1200px;
    margin: 20px auto 40px;
    padding: 0 16px 40px;
  }
  .top-summary {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
  }
  .card {
    background: #18181c;
    border-radius: 6px;
    flex: 1 1 0;
    padding: 16px 20px 20px 16px;
    display: flex;
    flex-direction: column;
    position: relative;
    min-width: 0;
  }
  .card-line {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }
  .card-header {
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-header .grade {
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    font-size: 20px;
    padding: 2px 6px;
    border-radius: 3px;
    color: #0f0f11;
  }
  .card-header .desc {
    font-weight: 400;
    color: #bbb;
  }
  .card-number {
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    font-size: 42px;
    line-height: 1;
    margin-bottom: 4px;
    user-select: none;
  }
  .card-percent {
    font-size: 14px;
    color: #999;
    margin-bottom: 10px;
  }
  .card-names {
    font-size: 13px;
    line-height: 1.3;
    color: #ccc;
    overflow-wrap: break-word;
  }
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .filter-bar button {
    background: transparent;
    border: 2px solid #555;
    border-radius: 5px;
    padding: 6px 16px;
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    color: #bbb;
    cursor: pointer;
    transition: background-color 0.2s, border-color 0.2s, color 0.2s;
    user-select: none;
  }
  .filter-bar button.active {
    color: #0f0f11;
    border-color: transparent;
  }
  .filter-bar .all.active { background-color: #888; color: #0f0f11; border-color: transparent; }
  .filter-bar .A.active { background-color: #4ade80; color: #0f0f11; border-color: transparent; }
  .filter-bar .B.active { background-color: #60a5fa; color: #0f0f11; border-color: transparent; }
  .filter-bar .C.active { background-color: #fbbf24; color: #0f0f11; border-color: transparent; }
  .filter-bar .D.active { background-color: #f87171; color: #0f0f11; border-color: transparent; }
  .filter-bar .count {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    color: #aaa;
    user-select: none;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    user-select: none;
  }
  thead tr {
    border-bottom: 1px solid #333;
  }
  thead th {
    color: #999;
    font-weight: 700;
    padding: 10px 8px;
    text-align: center;
    font-family: 'DM Mono', monospace;
  }
  tbody tr {
    background: #18181c;
    border-bottom: 1px solid #222;
    cursor: pointer;
    transition: background-color 0.15s;
  }
  tbody tr:hover {
    background: #222226;
  }
  tbody tr.expanded {
    background: #222226;
  }
  tbody td {
    padding: 10px 8px;
    vertical-align: middle;
  }
  tbody td:nth-child(1) {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    color: #bbb;
    width: 36px;
    user-select: text;
  }
  tbody td:nth-child(2), tbody td:nth-child(3) {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  tbody td:nth-child(2) {
    max-width: 140px;
  }
  tbody td:nth-child(3) {
    max-width: 240px;
  }
  tbody td:nth-child(4) {
    padding: 10px 0 10px 8px;
    width: 160px;
  }
  .progress-bar {
    height: 14px;
    border-radius: 7px;
    background: #333;
    overflow: hidden;
    position: relative;
  }
  .progress-bar-inner {
    height: 100%;
    border-radius: 7px 0 0 7px;
    transition: width 0.3s ease;
  }
  .score-text {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    font-size: 12px;
    color: #0f0f11;
    user-select: none;
  }
  tbody td:nth-child(5) {
    text-align: center;
    width: 60px;
  }
  .grade-label {
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 12px;
    border: 1.5px solid;
    display: inline-block;
    user-select: none;
  }
  tbody td:nth-child(6),
  tbody td:nth-child(7),
  tbody td:nth-child(8),
  tbody td:nth-child(9) {
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    text-align: right;
    width: 50px;
    user-select: text;
  }
  tbody td:nth-child(10) {
    text-align: center;
    width: 28px;
    user-select: none;
  }
  .arrow {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-right: 2px solid #bbb;
    border-bottom: 2px solid #bbb;
    transform: rotate(45deg);
    margin: auto;
    transition: transform 0.25s ease;
  }
  tr.expanded td .arrow {
    transform: rotate(225deg);
    border-color: #4ade80;
  }
  .details-row {
    background: #18181c;
  }
  .details-cell {
    padding: 16px 20px 20px 20px;
    border-top: 1px solid #222;
  }
  .details-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px 24px;
    color: #ccc;
    font-size: 13px;
  }
  .details-section {
    word-break: break-word;
  }
  .details-section h4 {
    margin-top: 0;
    margin-bottom: 8px;
    font-weight: 700;
    color: #bbb;
    font-size: 14px;
  }
  ul.details-list {
    margin: 0;
    padding-left: 18px;
    list-style-type: disc;
    color: #ccc;
  }
  .alert-box {
    border-radius: 6px;
    padding: 10px 14px;
    margin-top: 8px;
    font-size: 13px;
    line-height: 1.3;
    white-space: pre-wrap;
  }
  .alert-warning {
    background-color: #fff3bf;
    color: #664d03;
  }
  .alert-error {
    background-color: #fca5a5;
    color: #7f1d1d;
  }
  #render-time {
    position: fixed;
    top: 10px;
    right: 14px;
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    font-size: 13px;
    color: #666;
    user-select: none;
    z-index: 9999;
  }
</style>
</head>
<body>
<div id="render-time"></div>
<div id="app">
  <div class="top-summary" role="region" aria-label="档位汇总">
    <!-- summary cards inserted by JS -->
  </div>
  <div class="filter-bar" role="region" aria-label="筛选栏">
    <button class="filter-btn all active" data-grade="all" type="button" aria-pressed="true">全部</button>
    <button class="filter-btn A" data-grade="A" type="button" aria-pressed="false">A档</button>
    <button class="filter-btn B" data-grade="B" type="button" aria-pressed="false">B档</button>
    <button class="filter-btn C" data-grade="C" type="button" aria-pressed="false">C档</button>
    <button class="filter-btn D" data-grade="D" type="button" aria-pressed="false">D档</button>
    <div class="count" aria-live="polite" aria-atomic="true">显示 0 / 0 条</div>
  </div>
  <table role="table" aria-label="候选人列表">
    <thead>
      <tr>
        <th scope="col">#</th>
        <th scope="col">姓名</th>
        <th scope="col">院校·方向</th>
        <th scope="col">总分</th>
        <th scope="col">档位</th>
        <th scope="col" title="技术能力 (满分40)">技术(40)</th>
        <th scope="col" title="项目质量 (满分30)">项目(30)</th>
        <th scope="col" title="学术背景 (满分20)">学术(20)</th>
        <th scope="col" title="成长潜力 (满分10)">潜力(10)</th>
        <th scope="col" aria-label="展开详情"></th>
      </tr>
    </thead>
    <tbody>
      <!-- rows inserted by JS -->
    </tbody>
  </table>
</div>
<script>
  const input = '[{"candidate_feedback":"","grade":"A","internal_feedback":{"review_note":"","strengths":["具备核心模块设计与实现能力，技术深度突出","有高并发系统实战经验，量化指标清晰","985名校背景且有ACM-ICPC金牌及开源贡献"],"tech_direction_suggestion":"重点考察分布式系统设计与高并发处理能力，深入探讨JVM调优与缓存策略","weaknesses":["实习经历时间较短，项目经历主要为课程设计","成长潜力方面经历递进不明显"]},"name":"陈明轩","school":"清华大学 · 计算机科学与技术","score_breakdown":{"academic_background":20,"growth_potential":5,"project_quality":26,"technical_ability":36},"total_score":87}]';
  const raw = JSON.parse(input);
  const RESUME_DATA = Array.isArray(raw) ? raw : [raw];

  // 档位颜色映射
  const GRADE_COLOR = {
    A: '#4ade80',
    B: '#60a5fa',
    C: '#fbbf24',
    D: '#f87171'
  };
  const GRADE_DESC = {
    A: '直接推荐',
    B: '建议复核',
    C: '存疑',
    D: '建议淘汰'
  };

  // 计算总人数及各档位人数
  const totalCount = RESUME_DATA.length;
  const gradeGroups = { A: [], B: [], C: [], D: [] };
  RESUME_DATA.forEach(item => {
    if (gradeGroups[item.grade]) {
      gradeGroups[item.grade].push(item);
    }
  });

  // 顶部汇总区渲染
  const topSummaryEl = document.querySelector('.top-summary');
  function renderTopSummary() {
    topSummaryEl.innerHTML = '';
    ['A','B','C','D'].forEach(g => {
      const arr = gradeGroups[g];
      const count = arr.length;
      const percent = totalCount === 0 ? 0 : (count / totalCount * 100).toFixed(1);
      const names = arr.map(i => i.name).join('，');
      const card = document.createElement('section');
      card.className = 'card';
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', `${g}档位，${GRADE_DESC[g]}，人数${count}，占比${percent}%，候选人：${names}`);
      const line = document.createElement('div');
      line.className = 'card-line';
      line.style.backgroundColor = GRADE_COLOR[g];
      card.appendChild(line);
      const header = document.createElement('div');
      header.className = 'card-header';
      const gradeSpan = document.createElement('span');
      gradeSpan.className = 'grade';
      gradeSpan.textContent = g;
      gradeSpan.style.backgroundColor = GRADE_COLOR[g];
      header.appendChild(gradeSpan);
      const descSpan = document.createElement('span');
      descSpan.className = 'desc';
      descSpan.textContent = GRADE_DESC[g];
      header.appendChild(descSpan);
      card.appendChild(header);
      const numberDiv = document.createElement('div');
      numberDiv.className = 'card-number';
      numberDiv.textContent = count;
      card.appendChild(numberDiv);
      const percentDiv = document.createElement('div');
      percentDiv.className = 'card-percent';
      percentDiv.textContent = percent + '%';
      card.appendChild(percentDiv);
      const namesDiv = document.createElement('div');
      namesDiv.className = 'card-names';
      namesDiv.textContent = names;
      card.appendChild(namesDiv);
      topSummaryEl.appendChild(card);
    });
  }

  // 筛选栏渲染和交互
  const filterBar = document.querySelector('.filter-bar');
  const filterButtons = filterBar.querySelectorAll('.filter-btn');
  const countDisplay = filterBar.querySelector('.count');
  let currentFilter = 'all';

  // 主表格tbody
  const tbody = document.querySelector('tbody');

  // 计算总分（四项相加）
  function calcTotalScore(score_breakdown) {
    return (score_breakdown.technical_ability||0) + (score_breakdown.project_quality||0) + (score_breakdown.academic_background||0) + (score_breakdown.growth_potential||0);
  }

  // 生成档位标签元素
  function createGradeLabel(grade) {
    const label = document.createElement('span');
    label.className = 'grade-label';
    label.textContent = grade;
    label.style.color = GRADE_COLOR[grade];
    label.style.borderColor = GRADE_COLOR[grade];
    return label;
  }

  // 生成总分进度条元素
  function createProgressBar(score, grade) {
    const container = document.createElement('div');
    container.className = 'progress-bar';
    const inner = document.createElement('div');
    inner.className = 'progress-bar-inner';
    inner.style.width = score + '%';
    inner.style.backgroundColor = GRADE_COLOR[grade];
    container.appendChild(inner);
    const scoreText = document.createElement('div');
    scoreText.className = 'score-text';
    scoreText.textContent = score;
    container.appendChild(scoreText);
    return container;
  }

  // 渲染主表格
  function renderTable() {
    tbody.innerHTML = '';
    let filteredData = currentFilter === 'all' ? RESUME_DATA : RESUME_DATA.filter(i => i.grade === currentFilter);
    filteredData.forEach((item, idx) => {
      const tr = document.createElement('tr');
      tr.tabIndex = 0;
      tr.setAttribute('aria-expanded', 'false');
      tr.dataset.idx = idx;
      // # 列
      const tdIdx = document.createElement('td');
      tdIdx.textContent = idx + 1;
      tr.appendChild(tdIdx);
      // 姓名
      const tdName = document.createElement('td');
      tdName.textContent = item.name;
      tr.appendChild(tdName);
      // 院校·方向
      const tdSchool = document.createElement('td');
      tdSchool.textContent = item.school;
      tr.appendChild(tdSchool);
      // 总分列
      const tdTotal = document.createElement('td');
      const totalScore = calcTotalScore(item.score_breakdown);
      const progressBar = createProgressBar(totalScore, item.grade);
      tdTotal.appendChild(progressBar);
      tr.appendChild(tdTotal);
      // 档位
      const tdGrade = document.createElement('td');
      tdGrade.appendChild(createGradeLabel(item.grade));
      tr.appendChild(tdGrade);
      // 技术(40)
      const tdTech
