<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>简历初筛看板</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono&family=Noto+Sans+SC&display=swap');
  html, body {
    margin: 0; padding: 0; height: 100%;
    background-color: #0f0f11;
    color: #ddd;
    font-family: 'Noto Sans SC', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  #app {
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px 20px 40px 20px;
    box-sizing: border-box;
  }
  h1 {
    margin: 0 0 16px 0;
    font-weight: 700;
    color: #eee;
    font-size: 24px;
  }
  /* 顶部汇总区 */
  .summary-cards {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }
  .summary-card {
    flex: 1;
    background: #18181c;
    border-radius: 4px;
    padding: 16px 20px 16px 12px;
    box-sizing: border-box;
    position: relative;
    user-select: none;
  }
  .summary-card .color-bar {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    border-radius: 4px 0 0 4px;
  }
  .summary-card .grade-label {
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    font-size: 20px;
    display: inline-block;
    vertical-align: middle;
  }
  .summary-card .grade-desc {
    font-size: 14px;
    color: #bbb;
    margin-left: 6px;
    vertical-align: middle;
  }
  .summary-card .count {
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    font-size: 36px;
    margin: 8px 0 4px 0;
    line-height: 1;
    color: inherit;
  }
  .summary-card .percent {
    font-size: 14px;
    color: #999;
    margin-bottom: 8px;
  }
  .summary-card .names {
    font-size: 12px;
    line-height: 1.4;
    max-height: 72px;
    overflow-y: auto;
    color: #ccc;
    padding-right: 4px;
  }
  /* 筛选栏 */
  .filter-bar {
    display: flex;
    align-items: center;
    margin-bottom: 16px;
    user-select: none;
  }
  .filter-buttons {
    display: flex;
    gap: 8px;
  }
  .filter-button {
    border: none;
    background: transparent;
    color: #888;
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .filter-button:hover:not(.active) {
    color: #bbb;
  }
  .filter-button.active {
    color: #fff;
    border-bottom: 2px solid;
  }
  .filter-button[data-grade="A"].active {
    border-color: #4ade80;
    color: #4ade80;
  }
  .filter-button[data-grade="B"].active {
    border-color: #60a5fa;
    color: #60a5fa;
  }
  .filter-button[data-grade="C"].active {
    border-color: #fbbf24;
    color: #fbbf24;
  }
  .filter-button[data-grade="D"].active {
    border-color: #f87171;
    color: #f87171;
  }
  .filter-button[data-grade="ALL"].active {
    border-color: #888;
    color: #eee;
  }
  .filter-info {
    margin-left: auto;
    font-size: 14px;
    color: #bbb;
    font-family: 'DM Mono', monospace;
  }
  /* 主表格 */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    table-layout: fixed;
  }
  thead tr {
    border-bottom: 1px solid #333;
  }
  thead th {
    color: #999;
    font-weight: 600;
    padding: 10px 8px 10px 8px;
    text-align: left;
    user-select: none;
  }
  tbody tr {
    border-bottom: 1px solid #222;
    cursor: pointer;
    transition: background-color 0.15s ease;
  }
  tbody tr:hover {
    background-color: #222227;
  }
  tbody tr.expanded {
    background-color: #1e1e24;
  }
  tbody td {
    padding: 10px 8px 10px 8px;
    vertical-align: middle;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  tbody td.right-align {
    text-align: right;
    font-family: 'DM Mono', monospace;
  }
  tbody td.mono {
    font-family: 'DM Mono', monospace;
  }
  /* 总分进度条 */
  .score-bar-wrapper {
    position: relative;
    background: #222228;
    border-radius: 4px;
    height: 18px;
    width: 100%;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 4px 0 0 4px;
  }
  .score-bar-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    font-size: 12px;
    color: #0f0f11;
    user-select: none;
  }
  /* 档位标签 */
  .grade-tag {
    display: inline-block;
    border: 1.5px solid;
    border-radius: 4px;
    padding: 2px 8px;
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    font-size: 12px;
    text-align: center;
    user-select: none;
    min-width: 24px;
  }
  /* 展开箭头 */
  .arrow-cell {
    width: 22px;
    text-align: center;
    user-select: none;
  }
  .arrow {
    display: inline-block;
    border: solid #888;
    border-width: 0 2.5px 2.5px 0;
    padding: 4px;
    transform: rotate(45deg);
    transition: transform 0.25s ease;
  }
  .arrow.expanded {
    transform: rotate(-135deg);
    border-color: #60a5fa;
  }
  /* 详情面板 */
  .detail-panel {
    background: #18181c;
    padding: 16px 20px;
    color: #ccc;
    font-size: 13px;
    font-family: 'Noto Sans SC', sans-serif;
    border-top: 1px solid #2a2a2f;
  }
  .detail-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px 20px;
  }
  .detail-section {
    word-break: break-word;
  }
  .detail-section h4 {
    margin: 0 0 6px 0;
    font-weight: 700;
    font-size: 14px;
    color: #eee;
    user-select: none;
  }
  .detail-section ul {
    margin: 0;
    padding-left: 18px;
    color: #bbb;
  }
  .detail-section ul li {
    margin-bottom: 4px;
  }
  .detail-text {
    white-space: pre-wrap;
    color: #bbb;
  }
  /* 警告框 */
  .warning-box {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 4px;
    font-weight: 600;
    font-size: 13px;
    user-select: none;
  }
  .warning-yellow {
    background-color: #fbbf24;
    color: #0f0f11;
  }
  .warning-red {
    background-color: #f87171;
    color: #0f0f11;
  }
  /* 滚动条 */
  .summary-card .names::-webkit-scrollbar {
    width: 6px;
  }
  .summary-card .names::-webkit-scrollbar-thumb {
    background: #444;
    border-radius: 3px;
  }
  .summary-card .names::-webkit-scrollbar-track {
    background: transparent;
  }
  /* 顶部时间 */
  #time-info {
    position: fixed;
    top: 12px;
    right: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: #888;
    user-select: none;
    z-index: 9999;
  }
</style>
</head>
<body>
<div id="time-info"></div>
<div id="app">
  <h1>简历初筛看板</h1>
  <div class="summary-cards" aria-label="档位汇总">
    <!-- 汇总卡片动态生成 -->
  </div>
  <div class="filter-bar" role="region" aria-label="筛选栏">
    <div class="filter-buttons" role="group" aria-label="档位筛选">
      <button class="filter-button active" data-grade="ALL" type="button" aria-pressed="true">全部</button>
      <button class="filter-button" data-grade="A" type="button" aria-pressed="false">A档</button>
      <button class="filter-button" data-grade="B" type="button" aria-pressed="false">B档</button>
      <button class="filter-button" data-grade="C" type="button" aria-pressed="false">C档</button>
      <button class="filter-button" data-grade="D" type="button" aria-pressed="false">D档</button>
    </div>
    <div class="filter-info" aria-live="polite" aria-atomic="true">
      显示 0 / 0 条
    </div>
  </div>
  <table role="table" aria-label="候选人列表">
    <thead>
      <tr>
        <th scope="col" style="width: 30px;">#</th>
        <th scope="col" style="width: 140px;">姓名</th>
        <th scope="col" style="width: 240px;">院校·方向</th>
        <th scope="col" style="width: 140px;">总分</th>
        <th scope="col" style="width: 70px;">档位</th>
        <th scope="col" style="width: 60px; text-align:right;">技术(40)</th>
        <th scope="col" style="width: 60px; text-align:right;">项目(30)</th>
        <th scope="col" style="width: 60px; text-align:right;">学术(20)</th>
        <th scope="col" style="width: 60px; text-align:right;">潜力(10)</th>
        <th scope="col" style="width: 30px;" aria-label="展开详情"></th>
      </tr>
    </thead>
    <tbody>
      <!-- 主表格内容动态生成 -->
    </tbody>
  </table>
</div>
<script>
  const RESUME_DATA = [{"candidate_feedback":"核心技能与岗位要求匹配度不足；当前投递方向与候选人背景匹配度较低。","grade":"D","internal_feedback":{"review_note":"","strengths":[],"tech_direction_suggestion":"无有效技术信息，建议淘汰。","weaknesses":["简历无任何项目或实习经历支撑技术能力，无法评估技术深度和广度。","缺乏学历信息及学术背景描述，无法判断学术水平。"]},"score_breakdown":{"academic_background":0,"growth_potential":0,"project_quality":0,"technical_ability":0},"total_score":0}];

  // 档位说明及颜色
  const GRADE_INFO = {
    A: {desc: '直接推荐', color: '#4ade80'},
    B: {desc: '建议复核', color: '#60a5fa'},
    C: {desc: '存疑', color: '#fbbf24'},
    D: {desc: '建议淘汰', color: '#f87171'}
  };

  // 计算总分，自动相加四项
  function calcTotalScore(item) {
    const sb = item.score_breakdown;
    return sb.technical_ability + sb.project_quality + sb.academic_background + sb.growth_potential;
  }

  // 格式化百分比，保留一位小数
  function formatPercent(num) {
    return (num * 100).toFixed(1) + '%';
  }

  // 时间格式化 yyyy-MM-dd HH:mm:ss
  function formatDate(date) {
    const pad = n => n < 10 ? '0'+n : n;
    return date.getFullYear() + '-' + pad(date.getMonth()+1) + '-' + pad(date.getDate()) + ' ' + pad(date.getHours()) + ':' + pad(date.getMinutes()) + ':' + pad(date.getSeconds());
  }

  // 渲染顶部汇总区
  function renderSummaryCards(data) {
    const container = document.querySelector('.summary-cards');
    container.innerHTML = '';
    const total = data.length;
    const grades = ['A','B','C','D'];
    grades.forEach(g => {
      const items = data.filter(d => d.grade === g);
      const count = items.length;
      const percent = total === 0 ? 0 : count / total;
      const gradeInfo = GRADE_INFO[g];
      const card = document.createElement('div');
      card.className = 'summary-card';
      card.setAttribute('role','region');
      card.setAttribute('aria-label', g + '档位汇总');
      card.innerHTML = `
        <div class="color-bar" style="background-color:${gradeInfo.color};"></div>
        <div><span class="grade-label" style="color:${gradeInfo.color};">${g}</span><span class="grade-desc">${gradeInfo.desc}</span></div>
        <div class="count" style="color:${gradeInfo.color};">${count}</div>
        <div class="percent">${formatPercent(percent)}</div>
        <div class="names" tabindex="0" aria-label="${g}档候选人姓名列表">${items.map(i => i.name || '(无名)').join('\n') || '(无候选人)'}</div>
      `;
      container.appendChild(card);
    });
  }

  // 渲染筛选栏按钮激活状态及计数
  function renderFilterBar(activeGrade, filteredCount, totalCount) {
    const buttons = document.querySelectorAll('.filter-button');
    buttons.forEach(btn => {
      const g = btn.dataset.grade;
      const active = (g === activeGrade);
      btn.classList.toggle('active', active);
      btn.setAttribute('aria-pressed', active ? 'true' : 'false');
    });
    const info = document.querySelector('.filter-info');
    info.textContent = `显示 ${filteredCount} / ${totalCount} 条`;
  }

  // 渲染主表格数据
  function renderTable(data) {
    const tbody = document.querySelector('tbody');
    tbody.innerHTML = '';
    data.forEach((item, idx) => {
      const totalScore = calcTotalScore(item);
      const gradeInfo = GRADE_INFO[item.grade] || {color:'#888', desc:''};
      // 总分进度条宽度百分比
      const progressPercent = Math.min(totalScore, 100);
      // 右对齐数字字符串
      const ta = 'right-align';
      // 防止空字符串导致显示空白，显示(无)
      const schoolDir = item.school || '(无)';
      const name = item.name || '(无名)';
      // 创建主行
      const tr = document.createElement('tr');
      tr.tabIndex = 0;
      tr.setAttribute('role','row');
      tr.dataset.index = idx;
      tr.innerHTML = `
        <td>${idx+1}</td>
        <td title="${name}">${name}</td>
        <td title="${schoolDir}">${schoolDir}</td>
        <td>
          <div class="score-bar-wrapper" aria-label="总分 ${totalScore} 分">
            <div class="score-bar-fill" style="width:${progressPercent}%;background-color:${gradeInfo.color};"></div>
            <div class="score-bar-text">${totalScore}</div>
          </div>
        </td>
        <td><span class="grade-tag" style="border-color:${gradeInfo.color};color:${gradeInfo.color};" aria-label="档位 ${item.grade}">${item.grade}</span></td>
        <td class="${ta} mono" title="技术能力">${item.score_breakdown.technical_ability}</td>
        <td class="${ta} mono" title="项目质量">${item.score_breakdown.project_quality}</td>
        <td class="${ta} mono" title="学术背景">${item.score_breakdown.academic_background}</td>
        <td class="${ta} mono" title="成长潜力">${item.score_breakdown.growth_potential}</td>
        <td class="arrow-cell" aria-label="展开详情" aria-expanded="false"><span class="arrow"></span></td>
      `;
      tbody.appendChild(tr);

      // 详情面板行
      const detailTr = document.createElement('tr');
      detailTr.className = 'detail-row';
      detailTr.style.display = 'none';
      detailTr.setAttribute('aria-hidden', 'true');
