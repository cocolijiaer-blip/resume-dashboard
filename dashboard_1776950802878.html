<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>简历初筛看板</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono&family=Noto+Sans+SC&display=swap');
  html,body {
    margin:0; padding:0; height:100%;
    background-color:#0f0f11;
    color:#eee;
    font-family: 'Noto Sans SC', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  #app {
    max-width:1200px;
    margin: 16px auto 40px;
    padding:0 12px;
  }
  header {
    font-size: 14px;
    color:#999;
    text-align:right;
    margin-bottom:12px;
    user-select:none;
  }
  .top-summary {
    display:flex;
    gap:12px;
    margin-bottom:20px;
  }
  .card {
    background:#18181c;
    border-radius:4px;
    flex:1 1 0;
    display:flex;
    padding:16px 20px 16px 12px;
    position:relative;
  }
  .card .color-bar {
    width:3px;
    border-radius:2px;
    margin-right:12px;
  }
  .card-content {
    flex:1;
    display:flex;
    flex-direction: column;
    justify-content: center;
    gap:6px;
  }
  .grade-label {
    font-weight: 700;
    font-size: 16px;
    user-select:none;
  }
  .grade-label .desc {
    font-weight:400;
    margin-left:6px;
    font-size: 13px;
    color:#bbb;
  }
  .count {
    font-family: 'DM Mono', monospace;
    font-size: 32px;
    line-height: 1;
    user-select:none;
  }
  .percent {
    font-size: 13px;
    color:#999;
    user-select:none;
  }
  .names {
    font-size: 14px;
    color:#ccc;
    line-height: 1.3;
    word-break: break-word;
    user-select:none;
  }
  /* 档位颜色 */
  .grade-A { color:#4ade80; }
  .grade-B { color:#60a5fa; }
  .grade-C { color:#fbbf24; }
  .grade-D { color:#f87171; }
  .color-A { background:#4ade80; }
  .color-B { background:#60a5fa; }
  .color-C { background:#fbbf24; }
  .color-D { background:#f87171; }

  /* 筛选栏 */
  .filter-bar {
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:16px;
    flex-wrap: wrap;
  }
  .filter-btn {
    cursor:pointer;
    border:none;
    background:#18181c;
    color:#bbb;
    font-weight: 600;
    font-size: 14px;
    padding:6px 14px;
    border-radius: 4px;
    user-select:none;
    transition: background-color 0.15s ease,color 0.15s ease;
  }
  .filter-btn.active {
    color:#fff;
  }
  .filter-A.active { background:#4ade80; color:#0f0f11; }
  .filter-B.active { background:#60a5fa; color:#0f0f11; }
  .filter-C.active { background:#fbbf24; color:#0f0f11; }
  .filter-D.active { background:#f87171; color:#0f0f11; }
  .filter-all.active {
    background:#555;
    color:#eee;
  }
  .filter-count {
    margin-left:auto;
    font-size: 14px;
    color:#999;
    user-select:none;
  }

  /* 表格 */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  thead tr {
    border-bottom: 1px solid #333;
  }
  thead th {
    text-align: left;
    padding: 10px 8px;
    color:#bbb;
    user-select:none;
  }
  tbody tr {
    background:#18181c;
    border-bottom: 1px solid #222;
    cursor:pointer;
    transition: background-color 0.15s ease;
  }
  tbody tr:hover {
    background:#222227;
  }
  tbody tr.expanded {
    background:#222227;
  }
  tbody tr.expanded:hover {
    background:#222227;
  }
  tbody td {
    padding: 10px 8px;
    vertical-align: middle;
    color:#ddd;
  }
  tbody td.center {
    text-align: center;
  }
  tbody td.right {
    text-align: right;
    font-family: 'DM Mono', monospace;
  }
  tbody td.mono {
    font-family: 'DM Mono', monospace;
  }
  tbody td.name-col {
    max-width:140px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  tbody td.school-col {
    max-width:200px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  tbody td.grade-col {
    padding: 4px 10px;
  }
  /* 档位标签 */
  .tag-grade {
    border: 1.5px solid;
    border-radius: 12px;
    font-weight: 700;
    font-size: 13px;
    padding: 2px 9px;
    display: inline-block;
    user-select:none;
    width: 24px;
    text-align: center;
    font-family: 'DM Mono', monospace;
  }
  /* 总分进度条 */
  .score-bar-container {
    position: relative;
    background: #222227;
    border-radius: 12px;
    height: 18px;
    width: 100px;
    overflow: hidden;
  }
  .score-bar-fill {
    height: 18px;
    border-radius: 12px 0 0 12px;
  }
  .score-bar-text {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    font-size: 13px;
    line-height: 18px;
    color: #0f0f11;
    user-select:none;
  }
  /* 展开箭头 */
  .arrow {
    display: inline-block;
    transition: transform 0.3s ease;
    user-select:none;
  }
  .arrow.expanded {
    transform: rotate(90deg);
  }

  /* 详情面板 */
  .detail-panel {
    background:#18181c;
    padding: 16px 24px 24px 24px;
    border-top: 1px solid #333;
    color:#ccc;
    font-size: 14px;
  }
  .detail-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px 24px;
  }
  .detail-section {
    background:#222227;
    border-radius: 6px;
    padding: 12px 16px;
    min-height: 80px;
  }
  .detail-section h4 {
    margin: 0 0 8px 0;
    font-weight: 700;
    font-size: 15px;
    color:#eee;
    user-select:none;
  }
  .detail-list {
    margin:0;
    padding-left: 20px;
    color:#ccc;
  }
  .detail-list li {
    margin-bottom: 6px;
  }
  .detail-text {
    white-space: pre-wrap;
    color:#ccc;
  }
  /* 警告框 */
  .alert {
    margin-top: 16px;
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 13px;
    user-select:none;
  }
  .alert-warning {
    background:#facc15;
    color:#3a3a00;
  }
  .alert-danger {
    background:#f87171;
    color:#3a0000;
  }
</style>
</head>
<body>
<div id="app">
  <header id="render-time"></header>
  <section class="top-summary" aria-label="档位汇总">
    <!-- 动态生成 -->
  </section>
  <section class="filter-bar" aria-label="筛选栏">
    <button class="filter-btn filter-all active" data-filter="all" type="button" aria-pressed="true">全部</button>
    <button class="filter-btn filter-A" data-filter="A" type="button" aria-pressed="false">A档</button>
    <button class="filter-btn filter-B" data-filter="B" type="button" aria-pressed="false">B档</button>
    <button class="filter-btn filter-C" data-filter="C" type="button" aria-pressed="false">C档</button>
    <button class="filter-btn filter-D" data-filter="D" type="button" aria-pressed="false">D档</button>
    <div class="filter-count" aria-live="polite" aria-atomic="true"></div>
  </section>
  <section class="table-section" aria-label="候选人列表">
    <table role="grid" aria-rowcount="1" aria-colcount="10" tabindex="0">
      <thead>
        <tr>
          <th scope="col" style="width: 40px;">#</th>
          <th scope="col" style="width: 140px;">姓名</th>
          <th scope="col" style="width: 200px;">院校·方向</th>
          <th scope="col" style="width: 120px;">总分</th>
          <th scope="col" style="width: 60px;">档位</th>
          <th scope="col" style="width: 60px; text-align:right;">技术(40)</th>
          <th scope="col" style="width: 60px; text-align:right;">项目(30)</th>
          <th scope="col" style="width: 60px; text-align:right;">学术(20)</th>
          <th scope="col" style="width: 60px; text-align:right;">潜力(10)</th>
          <th scope="col" style="width: 40px;" aria-label="展开详情"></th>
        </tr>
      </thead>
      <tbody>
        <!-- 动态生成 -->
      </tbody>
    </table>
  </section>
</div>
<script>
  const input = '[{"candidate_feedback":"核心技能与岗位要求匹配度不足；当前投递方向与候选人背景匹配度较低。","grade":"D","internal_feedback":{"review_note":"","strengths":[],"tech_direction_suggestion":"","weaknesses":[]},"name":"","school":"","score_breakdown":{"academic_background":0,"growth_potential":0,"project_quality":0,"technical_ability":0},"total_score":0}]';
  const raw = JSON.parse(input);
  const RESUME_DATA = Array.isArray(raw) ? raw : [raw];

  // 档位中文说明
  const GRADE_DESC = {
    A: '直接推荐',
    B: '建议复核',
    C: '存疑',
    D: '建议淘汰',
  };
  // 档位颜色类
  const GRADE_COLOR_CLASS = {
    A: 'color-A',
    B: 'color-B',
    C: 'color-C',
    D: 'color-D',
  };
  const GRADE_TEXT_COLOR_CLASS = {
    A: 'grade-A',
    B: 'grade-B',
    C: 'grade-C',
    D: 'grade-D',
  };

  // 计算总分(如果total_score没给，自动计算)
  RESUME_DATA.forEach(item => {
    if (typeof item.total_score !== 'number' || isNaN(item.total_score)) {
      const sb = item.score_breakdown || {};
      item.total_score = (sb.technical_ability||0) + (sb.project_quality||0) + (sb.academic_background||0) + (sb.growth_potential||0);
    }
  });

  // 统计档位人数
  const totalCount = RESUME_DATA.length;
  const gradeGroups = { A: [], B: [], C: [], D: [] };
  RESUME_DATA.forEach(item => {
    const g = item.grade || 'D';
    if (gradeGroups[g]) {
      gradeGroups[g].push(item);
    } else {
      gradeGroups.D.push(item);
    }
  });

  // 渲染顶部汇总卡片
  function renderTopSummary() {
    const container = document.querySelector('.top-summary');
    container.innerHTML = '';
    ['A','B','C','D'].forEach(g => {
      const group = gradeGroups[g];
      const count = group.length;
      const percent = totalCount === 0 ? 0 : ((count/totalCount)*100).toFixed(1);
      const names = group.map(x => x.name || '(空)').join('，') || '(无)';
      const card = document.createElement('div');
      card.className = 'card';
      card.setAttribute('tabindex', '0');
      card.setAttribute('role', 'region');
      card.setAttribute('aria-label', `档位${g}，${GRADE_DESC[g]}，人数${count}，占比${percent}%，候选人姓名`);
      card.innerHTML = `
        <div class="color-bar ${GRADE_COLOR_CLASS[g]}" aria-hidden="true"></div>
        <div class="card-content">
          <div class="grade-label ${GRADE_TEXT_COLOR_CLASS[g]}">${g}档 <span class="desc">${GRADE_DESC[g]}</span></div>
          <div class="count">${count}</div>
          <div class="percent">${percent}%</div>
          <div class="names" title="${names}">${names}</div>
        </div>
      `;
      container.appendChild(card);
    });
  }

  // 渲染筛选栏计数
  function renderFilterCount(filteredCount) {
    const counter = document.querySelector('.filter-count');
    counter.textContent = `显示 ${filteredCount} / ${totalCount} 条`;
  }

  // 生成总分进度条单元格内容
  function createScoreBar(score, grade) {
    const maxScore = 100;
    const widthPercent = Math.min(Math.max(score,0), maxScore);
    const colorClass = GRADE_COLOR_CLASS[grade] || 'color-D';
    const container = document.createElement('div');
    container.className = 'score-bar-container';
    const fill = document.createElement('div');
    fill.className = 'score-bar-fill ' + colorClass;
    fill.style.width = widthPercent + '%';
    fill.style.backgroundColor = getComputedStyle(document.querySelector('.' + colorClass)).backgroundColor;
    container.appendChild(fill);
    const text = document.createElement('div');
    text.className = 'score-bar-text';
    text.textContent = score;
    container.appendChild(text);
    return container;
  }

  // 创建档位标签元素
  function createGradeTag(grade) {
    const tag = document.createElement('span');
    tag.className = 'tag-grade ' + GRADE_COLOR_CLASS[grade];
    tag.textContent = grade;
    tag.setAttribute('aria-label', `档位${grade}`);
    return tag;
  }

  // 渲染主表格
  function renderTable(filterGrade = 'all') {
    const tbody = document.querySelector('tbody');
    tbody.innerHTML = '';
    let filteredData = RESUME_DATA;
    if (filterGrade !== 'all') {
      filteredData = RESUME_DATA.filter(item => item.grade === filterGrade);
    }
    filteredData.forEach((item, idx) => {
      const tr = document.createElement('tr');
      tr.setAttribute('tabindex', '0');
      tr.setAttribute('role', 'row');
      tr.dataset.index = idx;
      tr.dataset.grade = item.grade;

      // 序号
      const tdIndex = document.createElement('td');
      tdIndex.className = 'center';
      tdIndex.textContent = idx + 1;
      tr.appendChild(tdIndex);

      // 姓名
      const tdName = document.createElement('td');
      tdName.className = 'name-col';
      tdName.textContent = item.name || '(空)';
      tdName.title = item.name || '(空)';
      tr.appendChild(tdName);

      // 院校·方向
      const tdSchool = document.createElement('td');
      tdSchool.className = 'school-col';
      tdSchool.textContent = item.school || '';
      tdSchool.title = item.school || '';
      tr.appendChild(tdSchool);

      // 总分（进度条+数字）
      const tdTotal = document.createElement('td');
      tdTotal.className = 'mono';
      const scoreBar = createScoreBar(item.total_score || 0, item.grade);
      tdTotal.appendChild(scoreBar);
      tr.appendChild(tdTotal);

      // 档位标签
      const tdGrade = document.createElement('td');
      tdGrade.className = 'grade-col center';
      const gradeTag = createGradeTag(item.grade);
      tdGrade.appendChild(gradeTag);
      tr.appendChild(tdGrade);

      // 技术能力
      const tdTech = document.createElement('td');
      tdTech.className = 'right mono';
      tdTech.textContent = (item.score_breakdown && item.score_breakdown.technical_ability) || 0;
      tr.appendChild(tdTech);

      // 项目质量
      const tdProject = document.createElement('td');
      tdProject.className = 'right mono';
      tdProject.textContent = (item.score_breakdown && item.score_breakdown.project_quality) || 0;
      tr.appendChild(tdProject);

      // 学术背景
      const tdAcademic = document.createElement('td');
      tdAcademic.className = 'right mono';
      tdAcademic.textContent = (item.score_breakdown && item.score_breakdown.academic_background) || 0;
      tr.appendChild(tdAcademic);

      // 潜力
      const tdGrowth = document.createElement('td');
      tdGrowth.className = 'right mono';
