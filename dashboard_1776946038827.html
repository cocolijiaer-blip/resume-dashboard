<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>简历初筛看板</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono&family=Noto+Sans+SC&display=swap');
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0f0f11;
    color: #ddd;
    font-family: 'Noto Sans SC', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  #app {
    max-width: 1200px;
    margin: 16px auto 40px;
    padding: 0 16px 40px;
  }
  h1 {
    font-weight: normal;
    font-size: 1.5rem;
    margin-bottom: 8px;
    color: #ddd;
  }
  .top-summary {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
  }
  .summary-card {
    background: #18181c;
    border-radius: 4px;
    flex: 1 1 0;
    padding: 16px 16px 16px 20px;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .summary-card .color-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 4px 0 0 4px;
  }
  .summary-grade {
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    font-size: 1.25rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .summary-grade .grade-label {
    text-transform: uppercase;
    font-weight: 700;
  }
  .summary-grade .grade-desc {
    font-size: 0.875rem;
    font-weight: 400;
    color: #aaa;
  }
  .summary-count {
    font-family: 'DM Mono', monospace;
    font-size: 2.25rem;
    font-weight: 700;
    line-height: 1;
    color: inherit;
  }
  .summary-percent {
    font-family: 'DM Mono', monospace;
    font-size: 0.875rem;
    color: #999;
  }
  .summary-names {
    font-size: 0.75rem;
    line-height: 1.3;
    color: #bbb;
    overflow-wrap: break-word;
    white-space: pre-wrap;
    max-height: 72px;
    overflow-y: auto;
  }
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .filter-bar .btn {
    border: none;
    background: transparent;
    color: #888;
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    font-size: 0.875rem;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    user-select: none;
    transition: color 0.2s ease;
  }
  .filter-bar .btn.active {
    color: #fff;
  }
  .filter-bar .count-display {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 0.875rem;
    color: #bbb;
    user-select: none;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    font-size: 0.875rem;
  }
  thead tr {
    border-bottom: 1px solid #333;
  }
  thead th {
    color: #999;
    font-weight: 700;
    padding: 10px 8px;
    text-align: left;
    user-select: none;
  }
  tbody tr {
    background: #18181c;
    border-bottom: 1px solid #222;
    cursor: pointer;
    transition: background-color 0.15s ease;
  }
  tbody tr:hover {
    background: #222226;
  }
  tbody tr.expanded {
    background: #222226;
  }
  tbody td {
    padding: 8px 8px;
    vertical-align: middle;
    color: #ddd;
  }
  tbody td.numeric {
    font-family: 'DM Mono', monospace;
    text-align: right;
  }
  tbody td.grade-label {
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    text-align: center;
    border: 1.5px solid;
    border-radius: 4px;
    padding: 2px 6px;
    user-select: none;
  }
  .progress-bar-container {
    width: 100%;
    height: 18px;
    background: #2a2a2f;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 4px 0 0 4px;
    transition: width 0.3s ease;
  }
  .progress-bar-text {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    font-size: 0.75rem;
    color: #eee;
    user-select: none;
  }
  .expand-arrow {
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    font-size: 1rem;
    user-select: none;
    text-align: center;
    width: 20px;
    color: #888;
    transition: transform 0.3s ease;
  }
  .expand-arrow.expanded {
    transform: rotate(90deg);
    color: #ddd;
  }
  .details-panel {
    background: #222226;
    padding: 16px 20px;
    border-top: 1px solid #333;
    color: #ccc;
    font-size: 0.875rem;
  }
  .details-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px 24px;
    margin-bottom: 12px;
  }
  .details-section {
    word-break: break-word;
  }
  .details-section h4 {
    margin: 0 0 8px 0;
    font-weight: 700;
    color: #eee;
  }
  .details-section ul {
    margin: 0;
    padding-left: 18px;
    color: #bbb;
  }
  .details-section ul li {
    margin-bottom: 4px;
  }
  .alert-box {
    border-radius: 4px;
    padding: 10px 14px;
    margin-top: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.875rem;
    user-select: text;
  }
  .alert-yellow {
    background-color: #fff9db;
    color: #b45309;
  }
  .alert-red {
    background-color: #fee2e2;
    color: #b91c1c;
  }
  #header {
    display: flex;
    justify-content: flex-end;
    padding: 8px 16px 0 0;
    font-family: 'DM Mono', monospace;
    font-size: 0.875rem;
    color: #777;
    user-select: none;
  }
  /* Scrollbar for summary names if overflow */
  .summary-names::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }
  .summary-names::-webkit-scrollbar-thumb {
    background: #444;
    border-radius: 3px;
  }
  .summary-names::-webkit-scrollbar-track {
    background: transparent;
  }
</style>
</head>
<body>
<div id="header"></div>
<div id="app">
  <div class="top-summary" aria-label="档位汇总区"></div>
  <div class="filter-bar" role="group" aria-label="筛选栏">
    <button class="btn active" data-filter="all" aria-pressed="true">全部</button>
    <button class="btn" data-filter="A" aria-pressed="false">A档</button>
    <button class="btn" data-filter="B" aria-pressed="false">B档</button>
    <button class="btn" data-filter="C" aria-pressed="false">C档</button>
    <button class="btn" data-filter="D" aria-pressed="false">D档</button>
    <div class="count-display" aria-live="polite" aria-atomic="true"></div>
  </div>
  <table role="table" aria-label="候选人列表">
    <thead>
      <tr>
        <th scope="col" style="width: 36px;">#</th>
        <th scope="col" style="width: 140px; min-width: 140px;">姓名</th>
        <th scope="col" style="width: 220px; min-width: 180px;">院校·方向</th>
        <th scope="col" style="width: 160px; min-width: 140px;">总分</th>
        <th scope="col" style="width: 72px;">档位</th>
        <th scope="col" style="width: 56px;">技术(40)</th>
        <th scope="col" style="width: 56px;">项目(30)</th>
        <th scope="col" style="width: 56px;">学术(20)</th>
        <th scope="col" style="width: 56px;">潜力(10)</th>
        <th scope="col" style="width: 36px;"> </th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>
<script>
  // 数据源
  const RESUME_DATA = [{"candidate_feedback":"1.核心技能与岗位要求匹配度不足；2.当前投递方向与候选人背景匹配度较低。","grade":"D","internal_feedback":{"review_note":"","strengths":[],"tech_direction_suggestion":"","weaknesses":["简历内容缺失，无法评估技术能力和项目经验","无学历及成长性信息"]},"score_breakdown":{"academic_background":0,"growth_potential":0,"project_quality":0,"technical_ability":0},"total_score":0}];

  // 档位说明及颜色
  const GRADE_INFO = {
    A: {desc: "直接推荐", color: "#4ade80"},
    B: {desc: "建议复核", color: "#60a5fa"},
    C: {desc: "存疑", color: "#fbbf24"},
    D: {desc: "建议淘汰", color: "#f87171"},
  };

  // 计算总分（自动）
  RESUME_DATA.forEach(item => {
    const sb = item.score_breakdown;
    item.total_score = sb.technical_ability + sb.project_quality + sb.academic_background + sb.growth_potential;
  });

  // 获取 DOM
  const app = document.getElementById('app');
  const topSummaryEl = app.querySelector('.top-summary');
  const filterBar = app.querySelector('.filter-bar');
  const filterButtons = filterBar.querySelectorAll('.btn');
  const countDisplay = filterBar.querySelector('.count-display');
  const tbody = app.querySelector('tbody');
  const headerTime = document.getElementById('header');

  // 当前筛选状态
  let currentFilter = 'all';

  // 计算汇总数据
  function getSummaryData(data) {
    const total = data.length;
    const summary = {
      A: {count: 0, names: []},
      B: {count: 0, names: []},
      C: {count: 0, names: []},
      D: {count: 0, names: []},
    };
    data.forEach(item => {
      const g = item.grade.toUpperCase();
      if (summary[g]) {
        summary[g].count++;
        summary[g].names.push(item.name || '(无名)');
      }
    });
    Object.values(summary).forEach(s => s.names.sort());
    return {summary, total};
  }

  // 渲染顶部汇总卡片
  function renderTopSummary() {
    const {summary, total} = getSummaryData(RESUME_DATA);
    topSummaryEl.innerHTML = '';
    ['A','B','C','D'].forEach(g => {
      const info = GRADE_INFO[g];
      const data = summary[g];
      const percent = total ? (data.count / total * 100).toFixed(1) : '0.0';
      const card = document.createElement('section');
      card.className = 'summary-card';
      card.setAttribute('aria-label', `${g}档 ${info.desc}，人数 ${data.count}，占比 ${percent}%。`);
      card.innerHTML = `
        <div class="color-bar" style="background-color:${info.color}"></div>
        <div class="summary-grade" aria-hidden="true">
          <span class="grade-label">${g}</span>
          <span class="grade-desc">${info.desc}</span>
        </div>
        <div class="summary-count" style="color:${info.color}">${data.count}</div>
        <div class="summary-percent">${percent}%</div>
        <div class="summary-names" tabindex="0" aria-label="${g}档候选人名单">${data.names.join('\n') || '无'}</div>
      `;
      topSummaryEl.appendChild(card);
    });
  }

  // 渲染筛选栏按钮激活状态
  function updateFilterButtons() {
    filterButtons.forEach(btn => {
      const f = btn.getAttribute('data-filter');
      if (f === currentFilter) {
        btn.classList.add('active');
        btn.setAttribute('aria-pressed', 'true');
        if (GRADE_INFO[f]) {
          btn.style.color = GRADE_INFO[f].color;
        } else {
          btn.style.color = '#fff';
        }
      } else {
        btn.classList.remove('active');
        btn.setAttribute('aria-pressed', 'false');
        btn.style.color = '#888';
      }
    });
  }

  // 渲染主表格行
  function renderTableRows() {
    tbody.innerHTML = '';
    let filteredData = RESUME_DATA;
    if (currentFilter !== 'all') {
      filteredData = RESUME_DATA.filter(item => item.grade.toUpperCase() === currentFilter);
    }
    filteredData.forEach((item, idx) => {
      const g = (item.grade || 'D').toUpperCase();
      const info = GRADE_INFO[g] || GRADE_INFO.D;
      const sb = item.score_breakdown || {technical_ability:0,project_quality:0,academic_background:0,growth_potential:0};
      const total = item.total_score || 0;
      const totalPercent = Math.min(total,100);
      // tr 主行
      const tr = document.createElement('tr');
      tr.tabIndex = 0;
      tr.setAttribute('data-index', idx);
      tr.setAttribute('aria-expanded', 'false');
      tr.setAttribute('role', 'row');
      tr.innerHTML = `
        <td role="cell" aria-label="序号">${idx+1}</td>
        <td role="cell" aria-label="姓名">${item.name || '(无名)'}</td>
        <td role="cell" aria-label="院校及方向">${item.school || ''}</td>
        <td role="cell" aria-label="总分">
          <div class="progress-bar-container" aria-hidden="true">
            <div class="progress-bar-fill" style="width:${totalPercent}%;background-color:${info.color};"></div>
            <div class="progress-bar-text">${total}</div>
          </div>
        </td>
        <td role="cell" aria-label="档位">
          <span class="grade-label" style="color:${info.color};border-color:${info.color};">${g}</span>
        </td>
        <td role="cell" class="numeric" aria-label="技术能力得分">${sb.technical_ability}</td>
        <td role="cell" class="numeric" aria-label="项目质量得分">${sb.project_quality}</td>
        <td role="cell" class="numeric" aria-label="学术背景得分">${sb.academic_background}</td>
        <td role="cell" class="numeric" aria-label="成长潜力得分">${sb.growth_potential}</td>
        <td role="cell" aria-label="展开详情" class="expand-arrow" aria-expanded="false" tabindex="-1">&#9654;</td>
      `;
      tbody.appendChild(tr);

      // 详情面板 tr
      const trDetail = document.createElement('tr');
      trDetail.className = 'details-row';
      trDetail.style.display = 'none';
      trDetail.setAttribute('aria-hidden', 'true');
      trDetail.innerHTML = `
        <td colspan="10">
          <div class="details-panel" role="region" aria-live="polite" aria-atomic="true">
            <div class="details-grid">
              <div class="details-section" aria-label="亮点">
                <h4>亮点</h4>
                <ul>${(item.internal_feedback.strengths && item.internal_feedback.strengths.length) ? item.internal_feedback.strengths.map(s => `<li>${escapeHtml(s)}</li>`).join('') : '<li>无</li>'}</ul>
              </div>
              <div class="details-section" aria-label="不足">
                <h4>不足</h4>
                <ul>${(item.internal_feedback.weaknesses && item.internal_feedback.weaknesses.length) ? item.internal_feedback.weaknesses.map(w => `<li>${escapeHtml(w)}</li>`).join('') : '<li>无</li>'}</ul>
              </div>
              <div class="details-section" aria-label="面试技术方向建议">
                <h4>面试技术方向建议</h4>
                <div>${item.internal_feedback.tech_direction_suggestion ?
